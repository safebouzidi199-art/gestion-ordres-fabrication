version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: projetjee-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: Projetjee
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - projetjee-net

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: projetjee-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/Projetjee?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production_use_github_secrets}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - projetjee-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: projetjee-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - projetjee-net

  prometheus:
    image: prom/prometheus:latest
    container_name: projetjee-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - projetjee-net

  grafana:
    image: grafana/grafana:latest
    container_name: projetjee-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - projetjee-net

volumes:
  mysql_data:
  grafana_data:

networks:
  projetjee-net:
    driver: bridge
