name: CI Pipeline — Gestion Ordres Fabrication

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/projetjee-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/projetjee-frontend

jobs:
  # ══════════════════════════════════════════════════════
  # JOB 1 — Backend : Build · Tests · SonarCloud
  # ══════════════════════════════════════════════════════
  backend:
    name: 🔧 Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # requis pour SonarCloud (historique complet)

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies & Build
        run: mvn clean install -DskipTests -B

      - name: Run unit tests (H2 in-memory)
        run: mvn test -B

      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report -B

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/

  # ══════════════════════════════════════════════════════
  # JOB 2 — Frontend : Lint · Build production
  # ══════════════════════════════════════════════════════
  frontend:
    name: 🎨 Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Build production
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ══════════════════════════════════════════════════════
  # JOB 3 — DevSecOps : OWASP + Trivy
  # ══════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml \
            -B || true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html

      - name: Build Docker image for Trivy scan
        run: docker build -t projetjee-backend:scan .

      - name: Trivy — Scan image (CRITICAL vulns = fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'projetjee-backend:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Trivy — Full report (SARIF)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'projetjee-backend:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ══════════════════════════════════════════════════════
  # JOB 4 — Docker Build & Push + GitOps update
  #         (uniquement sur push vers main)
  # ══════════════════════════════════════════════════════
  docker-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag (short SHA)
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }}

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
            ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }}

      # GitOps : mettre à jour les tags dans les manifests K8s
      - name: Update K8s image tags (GitOps)
        run: |
          sed -i "s|image: .*projetjee-backend.*|image: ${{ env.DOCKER_IMAGE_BACKEND }}:${{ steps.tag.outputs.TAG }}|g" k8s/backend-deployment.yml
          sed -i "s|image: .*projetjee-frontend.*|image: ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ steps.tag.outputs.TAG }}|g" k8s/frontend-deployment.yml

      - name: Commit & Push updated K8s manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend-deployment.yml k8s/frontend-deployment.yml
          git diff --staged --quiet || git commit -m "ci: bump image tags to ${{ steps.tag.outputs.TAG }} [skip ci]"
          git push
