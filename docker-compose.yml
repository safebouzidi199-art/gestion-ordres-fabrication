version: '3.8'

services:

  # ================================
  # Base de données MySQL
  # ================================
  mysql:
    image: mysql:8.0
    container_name: projetjee-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Projetjee
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - projetjee-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Backend Spring Boot
  # ================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projetjee-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/Projetjee?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - projetjee-network

  # ================================
  # Frontend Angular
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projetjee-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - projetjee-network

volumes:
  mysql-data:

networks:
  projetjee-network:
    driver: bridge
