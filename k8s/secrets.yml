# ⚠️  NE PAS committer les vraies valeurs dans Git !
# Utiliser: kubectl apply -f secrets.yml
# Les valeurs sont en base64 : echo -n "valeur" | base64
#
# Pour créer les secrets via kubectl (recommandé) :
# kubectl create secret generic projetjee-secrets \
#   --from-literal=mysql-root-password=<MOT_DE_PASSE> \
#   --from-literal=jwt-secret=<JWT_SECRET_256_BITS> \
#   -n projetjee
apiVersion: v1
kind: Secret
metadata:
  name: projetjee-secrets
  namespace: projetjee
type: Opaque
data:
  # Remplacer par vos valeurs encodées en base64
  mysql-root-password: REPLACE_BASE64_PASSWORD
  jwt-secret: REPLACE_BASE64_JWT_SECRET
